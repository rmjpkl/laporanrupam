<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventaris Pos</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        background-color: #f4f4f9;
      }
      .container {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h3 {
        margin-top: 0;
        color: #333;
        font-size: 1.1rem;
      }
      textarea {
        width: 100%;
        height: 300px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
        font-family: monospace;
        box-sizing: border-box;
        margin-bottom: 15px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:active {
        background-color: #004085;
      }
      .status-msg {
        margin-top: 10px;
        font-size: 0.9rem;
        color: green;
        display: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      Laporan Kunjungan
      <textarea id="teksInventaris">
Izin melaporkan kegiatan kunjungan tatap muka warga binaan di aula pengawasan rupam pagi dalam keadaan aman</textarea
      >

      <button onclick="salinTeks()">Salin Teks</button>
      <p id="pesanSukses" class="status-msg">
        Teks berhasil disalin ke clipboard!
      </p>
    </div>

    <script>
      function salinTeks() {
        // Mengambil elemen textarea
        const areaTeks = document.getElementById("teksInventaris");
        const pesan = document.getElementById("pesanSukses");

        // Memilih teks di dalam textarea
        areaTeks.select();
        areaTeks.setSelectionRange(0, 99999); // Untuk perangkat mobile

        // Perintah salin
        navigator.clipboard
          .writeText(areaTeks.value)
          .then(() => {
            // Menampilkan pesan sukses singkat
            pesan.style.display = "block";
            setTimeout(() => {
              pesan.style.display = "none";
            }, 2000);
          })
          .catch((err) => {
            console.error("Gagal menyalin: ", err);
          });
      }
    </script>
  </body>
</html>
