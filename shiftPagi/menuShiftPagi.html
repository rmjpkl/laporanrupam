<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
      rel="stylesheet"
    />
    <title>Menu Laporan Shift Pagi</title>
    <style>
      .menu-item {
        text-align: center;
        margin-bottom: 15px;
      }

      .logo-container {
        text-align: center;
      }

      .logo {
        margin-top: 50px;
        max-width: 60px;
        max-height: 60px;
        margin-bottom: 10px;
      }
      body {
        background-color: rgb(160, 160, 255);
        color: #fff;
        text-align: center;
      }
      .btn-dark {
        background-color: #2c3e50;
        border: none;
        padding: 12px;
        transition: transform 0.2s;
      }
      .btn-dark:hover {
        transform: translateY(-3px);
        background-color: #1a252f;
      }
      i {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img src="../assets/logo.png" alt="Logo Beranda" class="logo" />
        <br />
        <h3 class="mb-4">LAPORAN SHIFT PAGI</h3>
      </div>
      <div class="row">
        <!-- ASTEKPAM: Menggunakan ikon clipboard untuk laporan kontrol -->
        <div class="col-md-4 menu-item">
          <a href="astekapamPagi.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-clipboard-check"></i> ASTEKPAM
          </a>
        </div>

        <!-- Inventaris: Menggunakan ikon kotak (boxes) -->
        <div class="col-md-4 menu-item">
          <a href="inventaris.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-boxes"></i> Inventaris
          </a>
        </div>

        <!-- Pembagian Makan: Menggunakan ikon peralatan makan -->
        <div class="col-md-4 menu-item">
          <a
            href="pembagianMakanPagi.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-utensils"></i> Makan WBP Pagi
          </a>
        </div>

        <!-- Apel: Menggunakan ikon megaphone/bullhorn -->
        <div class="col-md-4 menu-item">
          <a
            href="giatApelTampingDanSantri.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-bullhorn"></i> Apel Tamping & Santri
          </a>
        </div>

        <!-- Senam: Menggunakan ikon orang berlari -->
        <div class="col-md-4 menu-item">
          <a href="senamPagiWBP.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-running"></i> Senam Pagi WBP
          </a>
        </div>

        <!-- Kunjungan: Menggunakan ikon tanda pengenal -->
        <div class="col-md-4 menu-item">
          <a href="kunjungan.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-id-card"></i> Kunjungan
          </a>
        </div>

        <!-- Lagu Kebangsaan: Menggunakan ikon bendera -->
        <div class="col-md-4 menu-item">
          <a
            href="menyanikanlagukebangsaan.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-flag"></i> Lagu Kebangsaan
          </a>
        </div>

        <!-- Penggeledahan: Tetap menggunakan search (kaca pembesar) -->
        <div class="col-md-4 menu-item">
          <a
            href="penggeledahanPagi.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-search"></i> Penggeledahan
          </a>
        </div>

        <!-- Shalat: Menggunakan ikon orang berdoa -->
        <div class="col-md-4 menu-item">
          <a href="shalatDuhur.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-pray"></i> Shalat Duhur
          </a>
        </div>

        <!-- Pembagian Makan Siang -->
        <div class="col-md-4 menu-item">
          <a
            href="pembagianMakanSiang.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-utensils"></i> Makan WBP Siang
          </a>
        </div>

        <!-- Pintu Samping: Menggunakan ikon pintu tertutup -->
        <div class="col-md-4 menu-item">
          <a href="pintuSamping.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-door-closed"></i> Pintu Samping
          </a>
        </div>

        <!-- Trolling: Menggunakan ikon orang berjalan (patroli) -->
        <div class="col-md-4 menu-item">
          <a href="trollingBandgang.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-walking"></i> Trolling Brandgang
          </a>
        </div>

        <!-- Laporan General: Menggunakan ikon file teks -->
        <div class="col-md-4 menu-item">
          <a href="laporangeneral.html" class="btn btn-dark shadow btn-block">
            <i class="fas fa-file-alt"></i> Laporan General
          </a>
        </div>

        <div class="col-md-4 menu-item">
          <a
            href="kontrolblokhunian.html"
            class="btn btn-dark shadow btn-block"
          >
            <i class="fas fa-building"></i> Kontrol Blok Hunian
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
