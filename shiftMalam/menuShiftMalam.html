<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
      rel="stylesheet"
    />
    <title>Menu Laporan Shift Pagi</title>
    <style>
      .menu-item {
        text-align: center;
        margin-bottom: 15px;
      }

        text-align: center;
      }

      .logo {
        margin-top: 50px;
        max-width: 60px;
        max-height: 60px;
        margin-bottom: 10px;
      }
      body {

        text-align: center;
      }
      .btn-dark {
        background-color: #2c3e50;
        border: none;
        padding: 12px;
        transition: transform 0.2s;
      }
      .btn-dark:hover {
        transform: translateY(-3px);
        background-color: #1a252f;
      }
      i {
        margin-right: 8px;
      }

  <body>

      <div class="row">
        <!-- ASTEKPAM: Menggunakan ikon clipboard untuk laporan kontrol -->

          </a>
        </div>

        <!-- Inventaris: Menggunakan ikon kotak (boxes) -->

          </a>
        </div>

        <div class="col-md-4 menu-item">
          <a href="shalatIsya.html" class="btn btn-dark shadow btn-block">

          </a>
        </div>

        <div class="col-md-4 menu-item">
          <a href="memasukanlansia.html" class="btn btn-dark shadow btn-block">

          </a>
        </div>

        <!-- Laporan General: Menggunakan ikon file teks -->
        <div class="col-md-4 menu-item">

          </a>
        </div>

          <a href="trollingBandgang.html" class="btn btn-dark shadow btn-block">
