<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Shalat Ashar</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <style type="text/css">
      body {
        background-color: rgb(95, 62, 255);
      }
      .form-container {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        margin-top: 20px;
        margin-bottom: 20px;
      }
      #send_form {
        color: #fff;
        background: #4e4e4e;
        text-decoration: none;
        display: inline-block;
        padding: 10px 25px;
        border-radius: 0.3rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        font-size: 15px;
        width: 100%;
        text-align: center;
        border: none;
        cursor: pointer;
      }
      #send_form:hover {
        background: #333333;
      }
      #output {
        width: 100%;
        min-height: 250px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: monospace;
        font-size: 0.95em;
        line-height: 1.5;
        resize: vertical;
        box-sizing: border-box;
        background-color: #f8f9fa;
        margin-top: 15px;
        white-space: pre-wrap;
      }
      .copy-button-container {
        text-align: right;
        margin-top: 10px;
      }
      #copyButton {
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 8px 15px;
        cursor: pointer;
        font-size: 0.9em;
      }
      #copyButton:hover {
        background-color: #218838;
      }
    </style>
  </head>

  <body>
    <div class="container-sm">
      <div class="form-container">
        <h1 class="text-center mb-4">LAPORAN SHALAT ASHAR DI MASJID</h1>
        <form id="shalatForm">
          <fieldset class="form-group border p-3">
            <div class="mb-3">
              <label class="form-label fw-bold">Blok B</label>
              <input type="number" class="form-control" id="blokB" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Blok C</label>
              <input type="number" class="form-control" id="blokC" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Blok D</label>
              <input type="number" class="form-control" id="blokD" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Blok E</label>
              <input
                type="number"
                class="form-control"
                id="blokE"
                required
                onkeyup="getjumlahSeluruh()"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Jumlah</label>
              <input
                type="number"
                class="form-control"
                id="jumlah"
                name="jumlah"
                readonly
              />

              <script>
                function getjumlahSeluruh() {
                  // Deklarasi variable
                  var input_blokB =
                    parseInt(document.getElementById("blokB").value) || 0;
                  var input_blokC =
                    parseInt(document.getElementById("blokC").value) || 0;
                  var input_blokD =
                    parseInt(document.getElementById("blokD").value) || 0;
                  var input_blokE =
                    parseInt(document.getElementById("blokE").value) || 0;

                  // Proses penjumlahan (Hanya B, C, D, E sesuai sumber asli)
                  var hasilSeluruh =
                    input_blokB + input_blokC + input_blokD + input_blokE;

                  // Output
                  document.getElementById("jumlah").value = hasilSeluruh;
                }
              </script>
            </div>
          </fieldset>

          <button
            class="mt-3"
            id="send_form"
            type="button"
            onclick="generateLaporan()"
          >
            <i class="fa fa-file-alt"></i> Generate Laporan
          </button>
        </form>

        <!-- Area Output Teks -->
        <textarea id="output" style="display: none"></textarea>

        <!-- Tombol Copy -->
        <div
          class="copy-button-container"
          id="copyContainer"
          style="display: none"
        >
          <button id="copyButton" onclick="copyToClipboard()">
            <i class="fa fa-copy"></i> Copy Laporan
          </button>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      function generateLaporan() {
        // Ambil nilai dari input form
        var input_jumlah = document.getElementById("jumlah").value;
        var input_blokB = document.getElementById("blokB").value;
        var input_blokC = document.getElementById("blokC").value;
        var input_blokD = document.getElementById("blokD").value;
        var input_blokE = document.getElementById("blokE").value;

        // Validasi
        if (!input_jumlah || input_jumlah == 0) {
          alert("Isi semua data Blok terlebih dahulu!");
          return;
        }

        // Format Text Laporan (Mengambil template teks dari source 2)
        var laporan = `Izin melaporkan, 
giat sholat Ashar berjamaah di masjid:
----------------------------------
\`\`\`Blok B : ${input_blokB} orang
Blok C : ${input_blokC} orang
Blok D : ${input_blokD} orang
Blok E : ${input_blokE} orang
JUMLAH : ${input_jumlah} orang\`\`\`
----------------------------------
Pengawasan rupam pagi, keadaan Aman🙏`;

        // Tampilkan teks ke dalam textarea
        const outputElement = document.getElementById("output");
        outputElement.value = laporan;
        outputElement.style.display = "block";

        // Munculkan tombol copy
        document.getElementById("copyContainer").style.display = "block";
      }

      function copyToClipboard() {
        const outputElement = document.getElementById("output");
        outputElement.select();
        outputElement.setSelectionRange(0, 99999); // Untuk perangkat mobile

        navigator.clipboard
          .writeText(outputElement.value)
          .then(() => {
            // Animasi tombol saat berhasil disalin
            const btn = document.getElementById("copyButton");
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-check"></i> Copied!';
            setTimeout(() => {
              btn.innerHTML = originalText;
            }, 2000);
          })
          .catch((err) => {
            console.error("Gagal menyalin: ", err);
            alert("Gagal menyalin teks.");
          });
      }
    </script>
  </body>
</html>
